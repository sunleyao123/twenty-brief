name: 每日自动更新简报

on:
  schedule:
    # 北京时间 06:00 = UTC 22:00 (前一天)
    - cron: '0 22 * * *'
  workflow_dispatch:
    # 允许手动触发（页面"更新知识"按钮调用）

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 生成今日简报数据
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/generate.py

      - name: 提交并推送数据
        run: |
          git config user.name "Twenty Brief Bot"
          git config user.email "bot@twenty-brief.com"
          git add data/brief.json
          git diff --staged --quiet || git commit -m "📰 自动更新简报 $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')"
          git push
