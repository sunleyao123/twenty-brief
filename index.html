<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Twenty Daily Brief｜每日简报</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{--bg:#F0F2F5;--card:#fff;--text:#0F172A;--sub:#374151;--muted:#64748B;--line:#E2E8F0}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);font-family:-apple-system,'PingFang SC','Noto Sans SC',sans-serif;min-height:100vh}
.wrap{max-width:480px;margin:0 auto;padding-bottom:100px}

/* ── LOADING ── */
#loading{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(160deg,#0F172A,#1E3A8A,#1D4ED8);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  transition:opacity .5s;
}
#loading.out{opacity:0;pointer-events:none}
.ld-icon{font-size:52px;animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.ld-title{font-size:22px;font-weight:900;color:#fff}.ld-title b{color:#60A5FA}
.ld-sub{font-size:12px;color:#93C5FD}
.ld-bar-bg{width:200px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden}
.ld-bar{height:4px;background:#60A5FA;border-radius:2px;width:0%;transition:width .4s}
.ld-msg{font-size:11px;color:#475569;min-height:14px}

/* ── HEADER ── */
.hd{background:linear-gradient(135deg,#0F172A 0%,#1E3A8A 55%,#1D4ED8 100%);padding:44px 18px 22px;position:relative;overflow:hidden}
.hd::before{content:'';position:absolute;top:-60px;right:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(96,165,250,.18) 0%,transparent 70%);border-radius:50%}
.hd-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:3px 11px;font-size:10px;color:#93C5FD;font-weight:700;letter-spacing:.5px;margin-bottom:10px}
.hd-title{font-size:27px;font-weight:900;color:#fff;letter-spacing:-.4px}
.hd-title b{color:#60A5FA;font-weight:900}
.hd-date{font-size:11px;color:#93C5FD;margin-top:5px;font-weight:500}
.hd-slogan{margin-top:13px;background:rgba(96,165,250,.12);border-left:3px solid #60A5FA;border-radius:0 9px 9px 0;padding:9px 13px;font-size:12px;color:#BFDBFE;font-weight:500;line-height:1.7}
.hd-day{display:inline-block;background:rgba(96,165,250,.28);border-radius:4px;padding:1px 8px;font-size:10px;color:#60A5FA;font-weight:700;margin-left:5px;vertical-align:middle}
.hd-update{position:absolute;top:46px;right:16px;font-size:9px;color:#475569;text-align:right;line-height:1.5}

/* ── SECTION LABEL ── */
.sl{display:flex;align-items:center;gap:8px;padding:15px 14px 6px;font-size:10px;color:var(--muted);font-weight:700;letter-spacing:1.2px}
.sl::after{content:'';flex:1;height:1px;background:var(--line)}

/* ── 2-COL ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:0 11px 2px}

/* ── CARD ── */
.c{background:var(--card);border-radius:15px;padding:13px 13px 14px;border:1px solid var(--line);box-shadow:0 1px 4px rgba(0,0,0,.05)}
.tag{display:inline-flex;align-items:center;border-radius:7px;padding:2px 8px;font-size:9px;font-weight:700;letter-spacing:.3px;margin-bottom:8px}
.ico{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:7px}
.ct{font-size:13.5px;font-weight:800;color:var(--text);line-height:1.3;margin-bottom:6px}
.cb{font-size:11.5px;color:var(--sub);line-height:1.65}
.box{margin-top:9px;border-radius:8px;padding:6px 9px;font-size:10.5px;font-weight:600;line-height:1.5}
.box-b{background:#F0F9FF;color:#0369A1}
.box-g{background:#ECFDF5;color:#065F46}
.box-v{background:#F5F3FF;color:#5B21B6}
.box-a{background:#FFFBEB;color:#92400E}
.flow{display:flex;align-items:center;flex-wrap:wrap;gap:3px;margin:7px 0}
.fs{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:5px;padding:2px 6px;font-size:9.5px;color:#1E40AF;font-weight:600}
.fa{font-size:10px;color:#94A3B8}
.sr{display:flex;align-items:center;gap:6px;margin:4px 0}
.sl2{font-size:10px;color:var(--muted);width:42px;flex-shrink:0}
.sbg{flex:1;height:5px;background:#F1F5F9;border-radius:3px;overflow:hidden}
.sb{height:5px;border-radius:3px}
.sv{font-size:10px;font-weight:700}
.qb{border-left:3px solid;padding:5px 8px;border-radius:0 7px 7px 0;margin:7px 0;font-size:10.5px;font-style:italic;line-height:1.55}

/* ── LANG ── */
.lc{background:var(--card);border-radius:15px;padding:13px;border:1px solid var(--line);box-shadow:0 1px 4px rgba(0,0,0,.05)}
.we{font-size:18px;font-weight:900;color:var(--text)}
.wp{font-size:10.5px;color:var(--muted);margin:1px 0}
.wpr{display:inline-block;border-radius:5px;padding:1px 7px;font-size:9.5px;font-weight:700;margin:2px 0}
.wm{font-size:12.5px;font-weight:700;color:var(--text);margin-top:2px}
.wd{height:1px;background:var(--line);margin:8px 0}
.el{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.8px;margin-bottom:3px}
.ee{font-size:11px;color:#1F2937;line-height:1.6}
.ec{font-size:10.5px;color:var(--muted);margin-top:2px;line-height:1.5}
.wj{font-size:20px;font-weight:900;color:var(--text)}
.wk{font-size:12px;color:#7C3AED;font-weight:600}
.wr{font-size:10px;color:var(--muted)}

/* ── AI CHAIN ── */
.aic{display:flex;align-items:center;margin:8px 0}
.ain{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;border:1.5px solid;flex-shrink:0}
.ail{flex:1;height:2px}
.tq{font-size:13.5px;font-weight:800;color:var(--text);line-height:1.5;margin:6px 0 9px}
.tt{display:inline-block;background:#FEF3C7;color:#92400E;border-radius:6px;padding:3px 8px;font-size:10px;font-weight:600;margin:2px 2px 0 0}

/* ── WORLD CUP ── */
.ww{padding:0 11px 16px}
.wcard{background:linear-gradient(140deg,#0F172A 0%,#1A2744 50%,#0F3460 100%);border-radius:18px;overflow:hidden}
.whd{padding:15px 16px 10px;display:flex;align-items:center;gap:10px}
.wt{font-size:16px;font-weight:900;color:#F0D060;letter-spacing:-.2px}
.ws{font-size:10px;color:#93C5FD;margin-top:2px}
.wbadge{background:#EF4444;color:#fff;border-radius:12px;padding:3px 9px;font-size:9px;font-weight:800;margin-left:auto;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
.wdiv{height:1px;background:rgba(255,255,255,.1);margin:0 16px}
.wsbl{font-size:9px;color:#F0D060;font-weight:700;letter-spacing:.8px;margin-bottom:10px}
.wmb{padding:10px 16px}
.mi{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:11px 13px;margin-bottom:8px}
.mi:last-child{margin-bottom:0}
.mitop{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.mtag{background:rgba(96,165,250,.25);color:#60A5FA;border-radius:5px;padding:2px 7px;font-size:9px;font-weight:700}
.mgrp{font-size:9px;color:#475569}
.mteams{display:flex;align-items:center;justify-content:space-between}
.mside{display:flex;align-items:center;gap:5px;flex:1}
.mside.r{justify-content:flex-end}
.mflag{font-size:20px}
.mname{font-size:12.5px;font-weight:700;color:#E2E8F0}
.mscore{font-size:22px;font-weight:900;color:#F0D060;min-width:56px;text-align:center;letter-spacing:1px}
.mscore.vs{color:#94A3B8;font-size:13px;font-weight:700}
.mscore.live{color:#34D399;font-size:13px}
.mnote{font-size:9.5px;color:#475569;margin-top:5px;text-align:center}
.pbars{display:flex;border-radius:3px;overflow:hidden;height:5px}
.pbw{background:#3B82F6}.pbd{background:#64748B}.pbl{background:#EF4444}
.pblbls{display:flex;justify-content:space-between;font-size:9px;color:#475569;margin-top:3px}
.prow{margin-top:8px}
.wft{display:flex;justify-content:space-around;padding:10px 16px 14px;border-top:1px solid rgba(255,255,255,.08)}
.wfn{font-size:20px;font-weight:900;color:#F0D060;text-align:center}
.wfl{font-size:9px;color:#475569;text-align:center;margin-top:2px}

/* ── BOTTOM ACTION BUTTONS ── */
.action-bar{
  position:fixed !important;
  bottom:0 !important;
  left:0 !important;
  right:0 !important;
  z-index:99999 !important;
  background:#fff !important;
  border-top:2px solid #E2E8F0;
  padding:12px 16px 20px;
  display:flex !important;
  gap:10px;
  box-shadow:0 -4px 24px rgba(0,0,0,.12);
}
.btn-screenshot{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  background:linear-gradient(135deg,#1D4ED8,#2563EB);
  color:#fff;border:none;border-radius:12px;padding:13px 0;
  font-size:14px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 12px rgba(37,99,235,.35);
  transition:transform .15s,box-shadow .15s;
  font-family:inherit;letter-spacing:.2px;
}
.btn-screenshot:active{transform:scale(.97);box-shadow:0 2px 6px rgba(37,99,235,.25)}
.btn-refresh{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  background:linear-gradient(135deg,#059669,#10B981);
  color:#fff;border:none;border-radius:12px;padding:13px 0;
  font-size:14px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 12px rgba(16,185,129,.35);
  transition:transform .15s,box-shadow .15s;
  font-family:inherit;
}
.btn-refresh:active{transform:scale(.97);box-shadow:0 2px 6px rgba(16,185,129,.25)}
.btn-refresh.loading{opacity:.7;pointer-events:none}
.btn-icon{font-size:16px}

/* ── TOAST ── */
.toast{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.9);
  background:rgba(15,23,42,.92);color:#fff;
  border-radius:14px;padding:14px 22px;
  font-size:13px;font-weight:600;text-align:center;line-height:1.7;
  z-index:9999;opacity:0;transition:all .3s;pointer-events:none;
  white-space:pre-line;max-width:280px;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}

/* ── SCREENSHOT OVERLAY ── */
.screenshot-hide{display:none!important}

.footer{text-align:center;font-size:10px;color:#94A3B8;padding:4px 0 16px;line-height:1.8}
</style>
</head>
<body>

<!-- 加载屏 -->
<div id="loading">
  <div class="ld-icon">📰</div>
  <div class="ld-title"><b>Twenty</b> Daily Brief</div>
  <div class="ld-sub">正在加载今日简报…</div>
  <div class="ld-bar-bg"><div class="ld-bar" id="lbar"></div></div>
  <div class="ld-msg" id="lmsg">初始化中…</div>
</div>

<!-- 主内容 -->
<div class="wrap" id="main-content" style="display:none">
  <div id="brief-body"></div>
  <div class="footer">
    Twenty Daily Brief · 为成长型运营人而生 ☕<br>
    <span style="font-size:9px">每天06:00自动更新 · 数据由 DeepSeek AI 生成</span>
  </div>
</div>

<!-- 底部按钮栏 -->
<div class="action-bar screenshot-hide" id="action-bar">
  <button class="btn-screenshot" onclick="doScreenshot()">
    <span class="btn-icon">📸</span>截图保存
  </button>
  <button class="btn-refresh" id="btn-refresh" onclick="doRefresh()">
    <span class="btn-icon">🔄</span>更新知识
  </button>
</div>

<!-- Toast 提示 -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════
//  工具函数
// ═══════════════════════════════════════
const $ = id => document.getElementById(id);
function prog(pct, msg){ $('lbar').style.width=pct+'%'; $('lmsg').textContent=msg; }
function delay(ms){ return new Promise(r=>setTimeout(r,ms)); }

function showToast(msg, duration=2500){
  const t=$('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), duration);
}

const bold = s => (s||'').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');

// ═══════════════════════════════════════
//  渲染函数
// ═══════════════════════════════════════
function pbar(w,d,l){ return `
  <div class="pbars">
    <div class="pbw" style="width:${w}%"></div>
    <div class="pbd" style="width:${d}%"></div>
    <div class="pbl" style="width:${l}%"></div>
  </div>
  <div class="pblbls"><span>🔵胜${w}%</span><span>⚪平${d}%</span><span>🔴负${l}%</span></div>`; }

function mFinished(m){ return `
  <div class="mi">
    <div class="mitop">
      <span class="mtag">${m.time}</span>
      <span class="mgrp">${m.group} · ${m.venue}</span>
      <span style="margin-left:auto;font-size:9px;color:#475569">已结束</span>
    </div>
    <div class="mteams">
      <div class="mside"><span class="mflag">${m.homeflag}</span><span class="mname">${m.home}</span></div>
      <div class="mscore">${m.score}</div>
      <div class="mside r"><span class="mname">${m.away}</span><span class="mflag">${m.awayflag}</span></div>
    </div>
    ${m.note?`<div class="mnote">📝 ${m.note}</div>`:''}
  </div>`; }

function mOngoing(m){ return `
  <div class="mi">
    <div class="mitop">
      <span class="mtag">${m.time}</span>
      <span class="mgrp">${m.group} · ${m.venue}</span>
      <span style="margin-left:auto;width:7px;height:7px;border-radius:50%;background:#34D399;display:inline-block;animation:blink 1s infinite"></span>
    </div>
    <div class="mteams">
      <div class="mside"><span class="mflag">${m.homeflag}</span><span class="mname">${m.home}</span></div>
      <div class="mscore live">进行中</div>
      <div class="mside r"><span class="mname">${m.away}</span><span class="mflag">${m.awayflag}</span></div>
    </div>
    <div class="prow">${pbar(m.winPct,m.drawPct,m.losePct)}</div>
  </div>`; }

function mUpcoming(m){ return `
  <div class="mi">
    <div class="mitop">
      <span class="mtag">${m.time}</span>
      <span class="mgrp">${m.day?m.day+' ':''}${m.group} · ${m.venue}</span>
    </div>
    <div class="mteams">
      <div class="mside"><span class="mflag">${m.homeflag}</span><span class="mname">${m.home}</span></div>
      <div class="mscore vs">VS</div>
      <div class="mside r"><span class="mname">${m.away}</span><span class="mflag">${m.awayflag}</span></div>
    </div>
    <div class="prow">${pbar(m.winPct,m.drawPct,m.losePct)}</div>
  </div>`; }

function render(d){
  const wc = d.worldcup || {phase:'',daysToFinal:'--',finished:[],ongoing:[],upcoming:[]};
  const genTime = d.generatedAt ? `更新于 ${d.generatedAt.slice(5,16)}` : '';

  $('brief-body').innerHTML = `
<!-- HEADER -->
<div class="hd">
  <div class="hd-update">${genTime}<br>每日06:00自动刷新</div>
  <div class="hd-badge">✦ DAILY BRIEF · 每日学习简报</div>
  <div class="hd-title"><b>Twenty</b> Daily Brief</div>
  <div class="hd-date">📅 ${d.date} · 北京时间</div>
  <div class="hd-slogan">
    ${d.slogan||'每天10分钟｜提升认知｜连接世界｜改变自己'}<br>
    <span style="color:#93C5FD;font-size:10px">为联通运营人每日定制</span>
    <span class="hd-day">${d.dayCount||''}</span>
  </div>
</div>

<!-- ① ② -->
<div class="sl">🧠 运营 &amp; 心理</div>
<div class="g2">
  <div class="c">
    <div class="tag" style="background:#DBEAFE;color:#1D4ED8">① 运营方法论</div>
    <div class="ico" style="background:#DBEAFE">${d.ops.icon}</div>
    <div class="ct">${d.ops.model}</div>
    <div class="cb">${d.ops.desc}</div>
    <div class="flow">${(d.ops.flow||[]).map((s,i)=>`${i?'<span class="fa">→</span>':''}<span class="fs">${s}</span>`).join('')}</div>
    <div class="box box-b">💡 ${d.ops.insight}</div>
  </div>
  <div class="c">
    <div class="tag" style="background:#EDE9FE;color:#6D28D9">② 消费心理学</div>
    <div class="ico" style="background:#EDE9FE">${d.psych.icon}</div>
    <div class="ct">${d.psych.concept}</div>
    <div class="cb">${d.psych.def}</div>
    <div class="qb" style="border-color:#7C3AED;background:#F5F3FF;color:#5B21B6">${d.psych.quote}</div>
    <div class="box box-v">💡 ${d.psych.insight}</div>
  </div>
</div>

<!-- ③ ④ -->
<div class="sl">💼 商业 &amp; 全球</div>
<div class="g2">
  <div class="c">
    <div class="tag" style="background:#D1FAE5;color:#065F46">③ 商业金融</div>
    <div class="ico" style="background:#D1FAE5">${d.biz.icon}</div>
    <div class="ct">${d.biz.topic}</div>
    <div class="cb">${d.biz.desc}</div>
    <div style="margin:8px 0">
      <div class="sr"><div class="sl2">${d.biz.stat1label}</div><div class="sbg"><div class="sb" style="background:#059669;width:${d.biz.stat1pct}%"></div></div><div class="sv" style="color:#059669">${d.biz.stat1val}</div></div>
      <div class="sr"><div class="sl2">${d.biz.stat2label}</div><div class="sbg"><div class="sb" style="background:#FCA5A5;width:${d.biz.stat2pct}%"></div></div><div class="sv" style="color:#DC2626">${d.biz.stat2val}</div></div>
    </div>
    <div class="box box-g">💡 ${d.biz.insight}</div>
  </div>
  <div class="c">
    <div class="tag" style="background:#FEE2E2;color:#B91C1C">④ 全球热点</div>
    <div class="ico" style="background:#FEE2E2">${d.global.icon}</div>
    <div class="ct">${d.global.title}</div>
    <div style="display:flex;flex-direction:column;gap:6px;margin-top:4px;font-size:11.5px;color:var(--sub);line-height:1.6">
      <div><b style="color:#DC2626">📌</b> ${d.global.what}</div>
      <div><b style="color:#F59E0B">❓</b> ${d.global.why}</div>
      <div><b style="color:#059669">👤</b> ${d.global.impact}</div>
    </div>
  </div>
</div>

<!-- ⑤ ⑥ -->
<div class="sl">🚀 科技 &amp; 娱乐</div>
<div class="g2">
  <div class="c">
    <div class="tag" style="background:#FEF3C7;color:#92400E">⑤ 科技巨头</div>
    <div style="display:flex;align-items:center;gap:7px;margin-bottom:8px">
      <div style="width:30px;height:30px;background:${d.tech.logoBg};border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:900;flex-shrink:0">${d.tech.logo}</div>
      <span style="font-size:10px;font-weight:700;color:var(--muted)">${d.tech.company}</span>
    </div>
    <div class="ct" style="font-size:12.5px">${d.tech.news}</div>
    <div class="cb">${d.tech.desc}</div>
    <div class="box box-a">💡 ${d.tech.insight}</div>
  </div>
  <div class="c">
    <div class="tag" style="background:#FCE7F3;color:#9D174D">⑥ 娱乐花边</div>
    <div class="ico" style="background:#FCE7F3">${d.ent.icon}</div>
    <div class="ct">${d.ent.title}</div>
    <div class="cb">${d.ent.desc}</div>
    <div class="qb" style="border-color:#EC4899;background:#FDF2F8;color:#BE185D">${d.ent.quote}</div>
    <div style="font-size:10px;color:var(--muted)">🎯 谈资指数 ${d.ent.stars}</div>
  </div>
</div>

<!-- ⑦ ⑧ -->
<div class="sl">🌐 语言学习</div>
<div class="g2">
  <div class="lc">

// ═══════════════════════════════════════
//  截图保存
//  原理：用 html2canvas 把页面渲染成 canvas，
//  再转成图片显示在全屏蒙层中，用户长按即可保存到相册
// ═══════════════════════════════════════
async function doScreenshot(){
  const btn = document.querySelector('.btn-screenshot');
  btn.disabled = true;
  btn.innerHTML = '<span class="btn-icon">⏳</span>生成中…';

  // 隐藏底部按钮栏，截图不含按钮
  const bar = $('action-bar');
  bar.style.display = 'none';
  // 滚动到顶部确保截图完整
  window.scrollTo(0, 0);
  await delay(300);

  try {
    const canvas = await html2canvas($('main-content'), {
      scale: window.devicePixelRatio || 2,   // 高清
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#F0F2F5',
      logging: false,
      width: document.body.scrollWidth,
      height: $('main-content').scrollHeight,
      windowWidth: document.body.scrollWidth,
      windowHeight: $('main-content').scrollHeight,
      scrollX: 0,
      scrollY: 0
    });

    bar.style.display = 'flex';
    btn.disabled = false;
    btn.innerHTML = '<span class="btn-icon">📸</span>截图保存';

    const imgUrl = canvas.toDataURL('image/png');

    // 创建全屏预览蒙层，让用户长按保存
    const overlay = document.createElement('div');
    overlay.id = 'img-overlay';
    overlay.style.cssText = `
      position:fixed;inset:0;z-index:99999;
      background:rgba(0,0,0,.92);
      display:flex;flex-direction:column;
      align-items:center;justify-content:flex-start;
      overflow-y:auto;padding:16px 0 80px;
    `;

    const hint = document.createElement('div');
    hint.style.cssText = `
      color:#fff;font-size:13px;font-weight:600;
      padding:12px 20px;text-align:center;line-height:1.7;
      background:rgba(255,255,255,.1);border-radius:12px;
      margin-bottom:14px;flex-shrink:0;
    `;
    hint.innerHTML = '📱 长按图片 → 保存到相册<br><span style="font-size:11px;color:#94A3B8">点击任意空白处关闭</span>';

    const img = document.createElement('img');
    img.src = imgUrl;
    img.style.cssText = `
      width:calc(100% - 24px);max-width:460px;
      border-radius:12px;display:block;
    `;

    const closeBtn = document.createElement('button');
    closeBtn.innerHTML = '✕ 关闭';
    closeBtn.style.cssText = `
      position:fixed;bottom:calc(16px + env(safe-area-inset-bottom));
      left:50%;transform:translateX(-50%);
      background:#fff;color:#0F172A;border:none;
      border-radius:20px;padding:10px 32px;
      font-size:14px;font-weight:700;cursor:pointer;
      box-shadow:0 4px 16px rgba(0,0,0,.3);
    `;
    closeBtn.onclick = () => document.body.removeChild(overlay);
    overlay.onclick = (e) => { if(e.target===overlay) document.body.removeChild(overlay); };

    overlay.appendChild(hint);
    overlay.appendChild(img);
    overlay.appendChild(closeBtn);
    document.body.appendChild(overlay);

    // PC 端额外提供下载链接
    const isPC = !('ontouchstart' in window);
    if(isPC){
      const a = document.createElement('a');
      a.href = imgUrl;
      a.download = `twenty-brief-${new Date().toLocaleDateString('zh-CN',{timeZone:'Asia/Shanghai'}).replace(/\//g,'-')}.png`;
      a.click();
      hint.innerHTML = '✅ 图片已自动下载<br><span style="font-size:11px;color:#94A3B8">点击任意空白处关闭预览</span>';
    }

  } catch(e) {
    bar.style.display = 'flex';
    btn.disabled = false;
    btn.innerHTML = '<span class="btn-icon">📸</span>截图保存';
    showToast('❌ 截图失败，请直接手动截屏\n' + e.message, 3000);
    console.error('Screenshot error:', e);
  }
}

// ═══════════════════════════════════════
//  更新知识
//  原理：调用 GitHub API 触发 workflow_dispatch
//  PAT token 存在 localStorage，首次使用弹窗输入
// ═══════════════════════════════════════
const PAT_KEY = 'twenty_gh_pat';
const REPO = 'sunleyao123/twenty-brief';
const WORKFLOW = 'daily.yml';

async function doRefresh(){
  // 获取或录入 PAT
  let pat = localStorage.getItem(PAT_KEY) || '';
  if(!pat){
    pat = await promptPAT();
    if(!pat) return;
  }

  const btn = $('btn-refresh');
  btn.classList.add('loading');
  btn.innerHTML = '<span class="btn-icon">⏳</span>触发中…';

  try {
    const resp = await fetch(
      `https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW}/dispatches`,
      {
        method: 'POST',
        headers: {
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${pat}`,
          'X-GitHub-Api-Version': '2022-11-28'
        },
        body: JSON.stringify({ ref: 'main' })
      }
    );

    if(resp.status === 204){
      // 成功
      showToast('✅ 更新已触发！\nAI 正在生成新内容（约1-2分钟）\n将自动刷新页面…', 5000);
      // 90秒后自动刷新
      setTimeout(() => window.location.reload(), 90000);
      // 倒计时显示
      let countdown = 90;
      const timer = setInterval(()=>{
        countdown--;
        if(countdown <= 0){ clearInterval(timer); return; }
        btn.innerHTML = `<span class="btn-icon">⏳</span>${countdown}s后刷新`;
      }, 1000);

    } else if(resp.status === 401 || resp.status === 403){
      // Token 无效，清除并重新输入
      localStorage.removeItem(PAT_KEY);
      showToast('⚠️ Token 无效或已过期\n请重新输入', 3000);
      setTimeout(() => doRefresh(), 1500);

    } else if(resp.status === 422){
      showToast('⚠️ 工作流未找到\n请检查仓库配置', 3000);
    } else {
      const body = await resp.text();
      showToast(`触发失败 (${resp.status})\n请稍后重试`, 3000);
      console.error('Dispatch error:', resp.status, body);
    }
  } catch(e) {
    showToast('📡 网络错误，请稍后重试', 3000);
    console.error(e);
  } finally {
    setTimeout(()=>{
      btn.classList.remove('loading');
      btn.innerHTML = '<span class="btn-icon">🔄</span>更新知识';
    }, 90000);
  }
}

// 弹窗输入 GitHub PAT
function promptPAT(){
  return new Promise(resolve => {
    const mask = document.createElement('div');
    mask.style.cssText = `
      position:fixed;inset:0;z-index:99998;
      background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
      display:flex;align-items:center;justify-content:center;padding:24px;
    `;
    mask.innerHTML = `
      <div style="background:#fff;border-radius:18px;padding:24px;width:100%;max-width:360px">
        <div style="font-size:18px;font-weight:800;color:#0F172A;margin-bottom:6px">🔑 首次设置</div>
        <div style="font-size:12px;color:#64748B;line-height:1.7;margin-bottom:16px">
          「更新知识」需要 GitHub Token，用于触发AI生成。<br>
          Token 仅保存在本机，不会上传任何服务器。<br><br>
          <b>获取方式：</b><br>
          GitHub → Settings → Developer settings<br>
          → Personal access tokens → Tokens (classic)<br>
          → Generate new token → 勾选 <b>workflow</b> → 生成并复制
        </div>
        <input id="pat-input" type="password"
          placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
          style="width:100%;border:1.5px solid #E2E8F0;border-radius:10px;padding:11px 13px;font-size:13px;font-family:monospace;outline:none;margin-bottom:12px"
        >
        <div style="display:flex;gap:8px">
          <button id="pat-cancel" style="flex:1;background:#F1F5F9;color:#64748B;border:none;border-radius:10px;padding:11px;font-size:13px;font-weight:600;cursor:pointer">取消</button>
          <button id="pat-confirm" style="flex:2;background:#2563EB;color:#fff;border:none;border-radius:10px;padding:11px;font-size:13px;font-weight:700;cursor:pointer">确认保存</button>
        </div>
        <div style="font-size:10px;color:#94A3B8;margin-top:10px;text-align:center">
          Token 格式：ghp_ 开头的字符串
        </div>
      </div>`;
    document.body.appendChild(mask);

    const input = mask.querySelector('#pat-input');
    input.focus();

    mask.querySelector('#pat-cancel').onclick = () => {
      document.body.removeChild(mask);
      resolve('');
    };
    mask.querySelector('#pat-confirm').onclick = () => {
      const val = input.value.trim();
      if(!val.startsWith('ghp_') && !val.startsWith('github_pat_')){
        input.style.borderColor = '#EF4444';
        input.placeholder = '格式不对，请检查后重新粘贴';
        return;
      }
      localStorage.setItem(PAT_KEY, val);
      document.body.removeChild(mask);
      resolve(val);
    };
    input.addEventListener('keydown', e => {
      if(e.key === 'Enter') mask.querySelector('#pat-confirm').click();
    });
  });
}

//  启动加载
// ═══════════════════════════════════════
async function boot(){
  prog(20, '加载今日简报…');
  await delay(300);
  try {
    // 加时间戳防止缓存
    const resp = await fetch(`./data/brief.json?t=${Date.now()}`);
    if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
    prog(70, '渲染页面…');
    const data = await resp.json();
    await delay(200);
    render(data);
    prog(100, '加载完成！');
    await delay(350);
  } catch(e) {
    prog(100, '加载失败');
    $('brief-body').innerHTML = `
      <div style="margin:30px 16px;background:#FEF2F2;border:1px solid #FECACA;border-radius:14px;padding:24px;text-align:center">
        <div style="font-size:36px;margin-bottom:10px">⚙️</div>
        <div style="font-size:16px;font-weight:700;color:#DC2626;margin-bottom:10px">内容尚未生成</div>
        <div style="font-size:12px;color:#7F1D1D;line-height:1.9;text-align:left;background:#fff;border-radius:8px;padding:12px 14px;margin-bottom:14px">
          请先完成首次初始化：<br>
          1️⃣ 打开 github.com/sunleyao123/twenty-brief<br>
          2️⃣ 点击顶部 <b>Actions</b> 选项卡<br>
          3️⃣ 左侧点「每日自动更新简报」<br>
          4️⃣ 右侧点 <b>Run workflow → Run workflow</b><br>
          5️⃣ 等待约 1-2 分钟后刷新此页
        </div>
        <div style="font-size:11px;color:#94A3B8;margin-bottom:12px">错误信息：${e.message}</div>
        <button onclick="location.reload()" style="width:100%;background:#2563EB;color:#fff;border:none;border-radius:10px;padding:12px;font-size:13px;font-weight:700;cursor:pointer">🔄 刷新页面</button>
      </div>`;
    console.error(e);
  }
  // 淡出loading
  const ld = $('loading');
  ld.classList.add('out');
  $('main-content').style.display = 'block';
  setTimeout(()=>{ ld.style.display='none'; }, 500);
}

boot();
</script>
